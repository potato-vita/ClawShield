site_name: ClawShield 开发者指南
site_description: ClawShield（OpenClaw 安全治理层）开发与部署文档
site_author: ClawShield
site_url: !ENV [DOCS_SITE_URL, "http://127.0.0.1:20000/"]
repo_url: !ENV [DOCS_REPO_URL, "https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"]
repo_name: !ENV [DOCS_REPO_NAME, "YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"]
docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:20000

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 架构设计: architecture.md
  - 运行时流程: runtime-flow.md
  - 策略与风控: policy-risk.md
  - API 参考: api-reference.md
  - OpenClaw 回调接入: opencaw-callback.md
  - 演示与报告: demo-and-report.md
  - 运维与部署: ops-and-deployment.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
