name: Deploy Docs To GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - github-pages-docs/**
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCS_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      DOCS_REPO_URL: https://github.com/${{ github.repository }}
      DOCS_REPO_NAME: ${{ github.repository }}
      NO_MKDOCS_2_WARNING: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github-pages-docs/requirements.txt

      - name: Deploy to gh-pages branch
        run: mkdocs gh-deploy -f github-pages-docs/mkdocs.yml --force
