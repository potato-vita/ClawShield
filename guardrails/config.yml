models:
  - type: main
    engine: placeholder
    model: semantic-minimal

rails:
  input:
    flows: [input]
  dialog:
    flows: [dialog]
  execution:
    flows: [execution]
  output:
    flows: [output]

actions_server_url: ""

actions:
  - guardrails.actions.task_context_actions
  - guardrails.actions.policy_actions
  - guardrails.actions.audit_actions

settings:
  explain: true
  verbose: true
  logging:
    enabled: true

